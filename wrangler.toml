name = "bible-commentaries"
main = "@astrojs/cloudflare/entrypoints/server"
compatibility_date = "2024-11-27"
compatibility_flags = ["nodejs_compat"]

# Staging custom domain on the production zone. The old Pages project owns the
# apex (4thewordofgod.com); this new hostname has no conflict, so it lets us
# verify the live Worker before cutting the apex over from Pages. It is
# automatically noindex (only the production host 4thewordofgod.com is
# crawlable — see src/middleware.ts).
routes = [{ pattern = "beta.4thewordofgod.com", custom_domain = true }]

# Keep the *.workers.dev URL working alongside the custom domain (adding routes
# disables it by default). Both are noindex except the production apex.
workers_dev = true

# Cloudflare Workers Static Assets: the prerendered/static files in dist/client
# are served directly from the edge; only on-demand routes hit the Worker.
[assets]
directory = "./dist/client"
binding = "ASSETS"

[observability]
enabled = true

# Content store: public-content/{lang}/json/{book}_{chapter}.json + homepage.json
[[r2_buckets]]
binding = "R2"
bucket_name = "bible-commentary-assets"

# Per-language navigation manifests (manifest:{lang}, manifest:languages).
[[kv_namespaces]]
binding = "MANIFEST"
id = "7833a2ad2d3e43cc86b31690042f1449"

# Sessions are unused, but the @astrojs/cloudflare adapter auto-injects a
# SESSION KV binding; point it at the same namespace so `wrangler deploy`
# accepts it (an id-less KV binding is rejected on deploy).
[[kv_namespaces]]
binding = "SESSION"
id = "7833a2ad2d3e43cc86b31690042f1449"
