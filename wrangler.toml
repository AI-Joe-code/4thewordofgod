name = "bible-commentaries"
main = "@astrojs/cloudflare/entrypoints/server"
compatibility_date = "2024-11-27"
compatibility_flags = ["nodejs_compat"]

# Custom domains. The apex `4thewordofgod.com` is the live production site
# (migrated off the old Cloudflare Pages project). `beta.4thewordofgod.com` is
# an optional staging host. Every non-apex host is automatically noindex — only
# the production apex is crawlable (see src/middleware.ts).
routes = [
  { pattern = "4thewordofgod.com", custom_domain = true },
  { pattern = "beta.4thewordofgod.com", custom_domain = true },
]

# Cloudflare Workers Static Assets: the prerendered/static files in dist/client
# are served directly from the edge; only on-demand routes hit the Worker.
[assets]
directory = "./dist/client"
binding = "ASSETS"

[observability]
enabled = true

# Content store: public-content/{lang}/json/{book}_{chapter}.json + homepage.json
[[r2_buckets]]
binding = "R2"
bucket_name = "bible-commentary-assets"

# Per-language navigation manifests (manifest:{lang}, manifest:languages).
[[kv_namespaces]]
binding = "MANIFEST"
id = "7833a2ad2d3e43cc86b31690042f1449"

# Sessions are unused, but the @astrojs/cloudflare adapter auto-injects a
# SESSION KV binding; point it at the same namespace so `wrangler deploy`
# accepts it (an id-less KV binding is rejected on deploy).
[[kv_namespaces]]
binding = "SESSION"
id = "7833a2ad2d3e43cc86b31690042f1449"
